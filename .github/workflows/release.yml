name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run Tests
        run: npm test

      - name: Build JS bundle
        run: npm run build

      - name: Package standalone binaries
        run: |
          npx pkg . --out-path bin --no-bytecode
          mv bin/jpa-cli-linux-x64 bin/jpa-cli-linux
          mv bin/jpa-cli-win-x64.exe bin/jpa-cli.exe

      - name: Release and Attach Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/jpa-cli-linux
            bin/jpa-cli-macos-x64
            bin/jpa-cli-macos-arm64
            bin/jpa-cli.exe
            install.sh
            install.ps1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to GitHub Packages
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" > .npmrc
          npm publish --registry=https://npm.pkg.github.com/
